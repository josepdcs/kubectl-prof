apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: prof
spec:
  homepage: https://github.com/josepdcs/kubectl-prof
  shortDescription: Generate CPU profiling graphs and other several outputs as JFR and heap dumps (Java), thread dumps (Java, Python), etc. from pods (Containerd, Cri-o are supported). This is a fork of flame plugin.
  version: "v2.1.0"
  description: |
    Generate CPU profiling graphs and other several outputs as JFR and heap dumps (Java), thread dumps (Java, Python), etc. without restarting pods and with low overhead. Containerd and Cri-o are supported. 
    This is an open source fork of https://github.com/yahoo/kubectl-flame with several new features and bug fixes.
  caveats: |
    Currently supported languages: Go, Java (any JVM based language), Python, Ruby, NodeJS, Clang and Clang++.
  platforms:
    - uri: https://github.com/josepdcs/kubectl-prof/releases/download/2.1.0/kubectl-prof_2.1.0_darwin_amd64.tar.gz
      sha256: 66d8ac2d26119c902feeee5989bb5fecd3df065c46dea445ed2d475feaf41876
      bin: kubectl-prof
      files:
        - from: kubectl-prof
          to: .
        - from: LICENSE
          to: .
      selector:
        matchLabels:
          os: darwin
          arch: amd64
    - uri: https://github.com/josepdcs/kubectl-prof/releases/download/2.1.0/kubectl-prof_2.1.0_darwin_arm64.tar.gz
      sha256: 2646f43f97f1f173972bc99c96dde001ca64e8743b69d9ec80d798e2a67d0b34
      bin: kubectl-prof
      files:
        - from: kubectl-prof
          to: .
        - from: LICENSE
          to: .
      selector:
        matchLabels:
          os: darwin
          arch: arm64
    - uri: https://github.com/josepdcs/kubectl-prof/releases/download/2.1.0/kubectl-prof_2.1.0_linux_amd64.tar.gz
      sha256: 544ebc7aa091e5af4ca39de6397ea8bc9e473f835f001632890dbf24071aa7eb
      bin: kubectl-prof
      files:
        - from: kubectl-prof
          to: .
        - from: LICENSE
          to: .
      selector:
        matchLabels:
          os: linux
          arch: amd64
    - uri: https://github.com/josepdcs/kubectl-prof/releases/download/2.1.0/kubectl-prof_2.1.0_linux_arm64.tar.gz
      sha256: 7fc46e394723f7e892feb0f91f84324a3637056dd07568dad28175b90d062675
      bin: kubectl-prof
      files:
        - from: kubectl-prof
          to: .
        - from: LICENSE
          to: .
      selector:
        matchLabels:
          os: linux
          arch: arm64
    - uri: https://github.com/josepdcs/kubectl-prof/releases/download/2.1.0/kubectl-prof_2.1.0_windows_amd64.zip
      sha256: 6eb71a921abcf68ec14c8813fe6610499f3e0e94b26a0128c37d5443b14b46fc
      bin: kubectl-prof.exe
      files:
        - from: kubectl-prof.exe
          to: .
        - from: LICENSE
          to: .
      selector:
        matchLabels:
          os: windows
          arch: amd64
    - uri: https://github.com/josepdcs/kubectl-prof/releases/download/2.1.0/kubectl-prof_2.1.0_windows_arm64.zip
      sha256: 7eee4ad7fb149e7e0f686735aef6685df379f6a0e2331b817b141bed668788c8
      bin: kubectl-prof.exe
      files:
        - from: kubectl-prof.exe
