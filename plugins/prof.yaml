apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: prof
spec:
  homepage: https://github.com/josepdcs/kubectl-prof
  shortDescription: Generate CPU profiling graphs and other several outputs as JFR and heap dumps (Java), thread dumps (Java, Python), etc. from pods (Containerd, Cri-o are supported). This is a fork of flame plugin.
  version: "v2.0.0"
  description: |
    Generate CPU profiling graphs and other several outputs as JFR and heap dumps (Java), thread dumps (Java, Python), etc. without restarting pods and with low overhead. Containerd and Cri-o are supported. 
    This is an open source fork of https://github.com/yahoo/kubectl-flame with several new features and bug fixes.
  caveats: |
    Currently supported languages: Go, Java (any JVM based language), Python, Ruby, NodeJS, Clang and Clang++.
  platforms:
    - uri: https://github.com/josepdcs/kubectl-prof/releases/download/2.0.0/kubectl-prof_2.0.0_darwin_amd64.tar.gz
      sha256: d6bc76e46243ddbf8955ff44f064da4bf4f67ac17a50908cc54faeb50b813494
      bin: kubectl-prof
      files:
        - from: kubectl-prof
          to: .
        - from: LICENSE
          to: .
      selector:
        matchLabels:
          os: darwin
          arch: amd64
    - uri: https://github.com/josepdcs/kubectl-prof/releases/download/2.0.0/kubectl-prof_2.0.0_darwin_arm64.tar.gz
      sha256: 7091078315643dd645e77fd2183897f60a69c0d975d6ff3587f6049503bb460e
      bin: kubectl-prof
      files:
        - from: kubectl-prof
          to: .
        - from: LICENSE
          to: .
      selector:
        matchLabels:
          os: darwin
          arch: arm64
    - uri: https://github.com/josepdcs/kubectl-prof/releases/download/2.0.0/kubectl-prof_2.0.0_linux_amd64.tar.gz
      sha256: 872d821cd7f3f7a91b05d5b701467f2484e422d43f4e566e646016209f90d2f2
      bin: kubectl-prof
      files:
        - from: kubectl-prof
          to: .
        - from: LICENSE
          to: .
      selector:
        matchLabels:
          os: linux
          arch: amd64
    - uri: https://github.com/josepdcs/kubectl-prof/releases/download/2.0.0/kubectl-prof_2.0.0_linux_arm64.tar.gz
      sha256: 96f8ff449c680dbe91994a725f96c8ec46e700026386be98ee301c471375b59e
      bin: kubectl-prof
      files:
        - from: kubectl-prof
          to: .
        - from: LICENSE
          to: .
      selector:
        matchLabels:
          os: linux
          arch: arm64
    - uri: https://github.com/josepdcs/kubectl-prof/releases/download/2.0.0/kubectl-prof_2.0.0_windows_amd64.zip
      sha256: ad693e6514a291a25c143008db0f2419a29c707ecc5d9591d6e592b23a2c4853
      bin: kubectl-prof.exe
      files:
        - from: kubectl-prof.exe
          to: .
        - from: LICENSE
          to: .
      selector:
        matchLabels:
          os: windows
          arch: amd64
    - uri: https://github.com/josepdcs/kubectl-prof/releases/download/2.0.0/kubectl-prof_2.0.0_windows_arm64.zip
      sha256: 6173fdfd7a10b84f9e8b4d2eac6a681acf231caa2466a0ea2a5b5820d5a06935
      bin: kubectl-prof.exe
      files:
