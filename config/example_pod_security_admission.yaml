# Namespace for profiler with policy admissions
apiVersion: v1
kind: Namespace
metadata:
  labels:
    pod-security.kubernetes.io/enforce: privileged
  name: profiler

---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    pod-security.kubernetes.io/enforce: baseline
  name: default

# Profiling will be (only) enabled for this service account
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: profiler
  namespace: profiler

# Default role allows all
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: default
  namespace: default
rules:
  - apiGroups:
      - ""
    resources: ["*"]
    verbs: ["*"]

# Default role binding for above default role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: default
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: default
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:serviceaccounts