apiVersion: v1
kind: Namespace
metadata:
  name: profiling

---
kind: ResourceQuota
apiVersion: v1
metadata:
  name: profiling-compute-resources
  namespace: profiling
spec:
  hard:
    limits.cpu: '3'
    limits.memory: 2Gi
    requests.cpu: '1'
    requests.memory: 1Gi

---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: profiler
  namespace: profiling

---
# NetworkPolicy to allow profiling agent pods in the "profiling" namespace
# to reach pprof endpoints exposed by apps in the "stupid-apps" namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-pprof-from-profiling
  namespace: stupid-apps
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: profiling
      ports:
        - protocol: TCP
          port: 6060