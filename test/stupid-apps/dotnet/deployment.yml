apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-deployment
  namespace: stupid-apps
  labels:
    app: dotnet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dotnet
  template:
    metadata:
      labels:
        app: dotnet
    spec:
      containers:
      - name: dotnet
        image: localhost/stupid-apps/dotnet:latest
        imagePullPolicy: Never
        #image: docker.io/josepdcs/dotnet:latest
        #imagePullPolicy: Always
        resources:
          limits:
            cpu: 100m
            memory: 200Mi
          requests:
            cpu: 20m
            memory: 50Mi
