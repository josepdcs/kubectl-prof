apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-deployment
  namespace: stupid-apps
  labels:
    app: php
spec:
  replicas: 1
  selector:
    matchLabels:
      app: php
  template:
    metadata:
      labels:
        app: php
    spec:
      containers:
      - name: php
        #image: localhost/stupid-apps/php:latest
        #imagePullPolicy: Never
        image: docker.io/josepdcs/php:latest
        imagePullPolicy: Always
        resources:
          limits:
            cpu: 100m
            memory: 200Mi
          requests:
            cpu: 20m
            memory: 50Mi
      automountServiceAccountToken: false
