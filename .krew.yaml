apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: profiling
spec:
  homepage: https://github.com/josepdcs/kubectl-profiling
  shortDescription: Generate CPU profiling graphs from pods (Docker, Cri-o and Containerd are supported)
  version: { { .TagName } }
  description: |
    Generate CPU profiling graphs without restarting pods and with low overhead.
  caveats: |
    Currently supported languages: Go, Java (any JVM based language), Python, Ruby, and NodeJS.
  platforms:
    - {{addURIAndSha "https://github.com/josepdcs/kubectl-profiling/releases/download/{{ .TagName }}/kubectl-profiling_{{ .TagName }}_darwin_x86_64.tar.gz" .TagName | indent 6 }}
      bin: kubectl-profiling
      files:
        - from: kubectl-profiling
          to: .
        - from: LICENSE
          to: .
      selector:
        matchLabels:
          os: darwin
          arch: amd64
    - {{addURIAndSha "https://github.com/josepdcs/kubectl-profiling/releases/download/{{ .TagName }}/kubectl-profiling_{{ .TagName }}_linux_x86_64.tar.gz" .TagName | indent 6 }}
      bin: kubectl-profiling
      files:
        - from: kubectl-profiling
          to: .
        - from: LICENSE
          to: .
      selector:
        matchLabels:
          os: linux
          arch: amd64
    - {{addURIAndSha "https://github.com/josepdcs/kubectl-profiling/releases/download/{{ .TagName }}/kubectl-profiling_{{ .TagName }}_linux_arm64.tar.gz" .TagName | indent 6 }}
      bin: kubectl-profiling
      files:
        - from: kubectl-profiling
          to: .
        - from: LICENSE
          to: .
      selector:
        matchLabels:
          os: linux
          arch: arm64
    - {{addURIAndSha "https://github.com/josepdcs/kubectl-profiling/releases/download/{{ .TagName }}/kubectl-profiling_{{ .TagName }}_windows_x86_64.zip" .TagName | indent 6 }}
      bin: kubectl-profiling.exe
      files:
        - from: kubectl-profiling.exe
          to: .
        - from: LICENSE
          to: .
      selector:
        matchLabels:
          os: windows
          arch: amd64
