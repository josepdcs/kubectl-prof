apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: profile
spec:
  homepage: https://github.com/josepdcs/kubectl-profile
  shortDescription: Generate CPU profiling graphs from pods (Docker, Cri-o are supported). It's a fork from flame plugin.
  version: { { .TagName } }
  description: |
    Generate CPU profiling graphs without restarting pods and with low overhead. Docker, Cri-o are supported, Containerd support is comming soon. 
    It's a fork from flame plugin.
  caveats: |
    Currently supported languages: Go, Java (any JVM based language), Python, Ruby, and NodeJS.
  platforms:
    - {{addURIAndSha "https://github.com/josepdcs/kubectl-profile/releases/download/{{ .TagName }}/kubectl-profile_{{ .TagName }}_darwin_x86_64.tar.gz" .TagName | indent 6 }}
      bin: kubectl-profile
      files:
        - from: kubectl-profile
          to: .
        - from: LICENSE
          to: .
      selector:
        matchLabels:
          os: darwin
          arch: amd64
    - {{addURIAndSha "https://github.com/josepdcs/kubectl-profile/releases/download/{{ .TagName }}/kubectl-profile_{{ .TagName }}_linux_x86_64.tar.gz" .TagName | indent 6 }}
      bin: kubectl-profile
      files:
        - from: kubectl-profile
          to: .
        - from: LICENSE
          to: .
      selector:
        matchLabels:
          os: linux
          arch: amd64
    - {{addURIAndSha "https://github.com/josepdcs/kubectl-profile/releases/download/{{ .TagName }}/kubectl-profile_{{ .TagName }}_linux_arm64.tar.gz" .TagName | indent 6 }}
      bin: kubectl-profile
      files:
        - from: kubectl-profile
          to: .
        - from: LICENSE
          to: .
      selector:
        matchLabels:
          os: linux
          arch: arm64
    - {{addURIAndSha "https://github.com/josepdcs/kubectl-profile/releases/download/{{ .TagName }}/kubectl-profile_{{ .TagName }}_windows_x86_64.zip" .TagName | indent 6 }}
      bin: kubectl-profile.exe
      files:
        - from: kubectl-profile.exe
          to: .
        - from: LICENSE
          to: .
      selector:
        matchLabels:
          os: windows
          arch: amd64
